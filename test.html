<head>

        .wrapper {
            display: block;

            border: 2px solid blue;
            white-space: nowrap;
            display: inline-block;
            width: 200px;
            /* flex: 0 0 200px; */
        }
    </style>
</head>

<body>

            <div class="item">3</div>
            <div class="item">4</div>
            <div class="item">5</div>

        </div>
        <div class="group">

</html>
